<!DOCTYPE html>
<!-- v1.1 - fix flicker on load -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente de Territorios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4F8EF7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TerriOS">
<link rel="apple-touch-icon" href="/assets/icons/icon-180.png">
</head>
<body>

<!-- Loading screen shown while checking auth -->
<div id="auth-loading" class="loading-screen">
  <div class="spinner"></div>
</div>

<!-- Login card hidden until we know user is not logged in -->
<div class="login-page" id="login-page" style="display:none">
  <div class="login-card">
    <div class="login-logo">Terri<span>·</span>OS</div>
    <p class="login-subtitle" data-i18n="loginSubtitle">Ingresa tus datos para continuar</p>

    <div class="login-error" id="login-error"></div>

    <div class="form-group">
      <label class="form-label" for="inp-email" data-i18n="email">Correo electrónico</label>
      <input type="email" class="form-control" id="inp-email" data-i18n-ph="email" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-password" data-i18n="password">Contraseña</label>
      <input type="password" class="form-control" id="inp-password" data-i18n-ph="password" autocomplete="current-password">
    </div>

    <div class="login-actions">
      <button class="btn btn-primary btn-lg w-full" id="btn-login">
        <span data-i18n="loginBtn">Entrar</span>
      </button>
    </div>

    <div class="login-forgot" id="btn-forgot" data-i18n="forgotPassword">¿Olvidaste tu contraseña?</div>

    <div class="login-lang">
      <button class="lang-toggle" id="lang-toggle" onclick="Lang.toggle()">EN</button>
    </div>
  </div>
</div>

<!-- Reset password modal -->
<div class="modal-overlay" id="modal-reset">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" data-i18n="resetPassword">Restablecer contraseña</span>
      <button class="modal-close" id="cls-reset">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="reset-email" data-i18n="email">Correo electrónico</label>
        <input type="email" class="form-control" id="reset-email" data-i18n-ph="email">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cls-reset-2" data-i18n="cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-do-reset" data-i18n="resetPassword">Restablecer</button>
    </div>
  </div>
</div>

<script type="module">
import { Auth, Utils } from '/assets/firebase2.js';

// Check auth state first — hide login until we know
Auth.onReady((user) => {
  if (user && Auth.currentRole) {
    // Already logged in — redirect without showing login
    redirectByRole(Auth.currentRole);
  } else {
    // Not logged in — show login form
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
  }
});

function redirectByRole(role) {
  if (role === 'admin') window.location.href = '/admin/';
  else window.location.href = '/coordinator/';
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('inp-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('btn-forgot').addEventListener('click', () => document.getElementById('modal-reset').classList.add('open'));
document.getElementById('cls-reset').addEventListener('click', () => document.getElementById('modal-reset').classList.remove('open'));
document.getElementById('cls-reset-2').addEventListener('click', () => document.getElementById('modal-reset').classList.remove('open'));

document.getElementById('btn-do-reset').addEventListener('click', async () => {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) return;
  try {
    await Auth.resetPassword(email);
    Utils.toast(Lang.t('resetSent'), 'success');
    document.getElementById('modal-reset').classList.remove('open');
  } catch (err) {
    Utils.toast(Lang.t('error') + ': ' + err.message, 'error');
  }
});

async function doLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!email || !password) {
    errEl.textContent = Lang.t('errorRequired');
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  errEl.classList.remove('show');

  try {
    await Auth.login(email, password);
    // Auth.onReady will fire and redirect
  } catch (err) {
    errEl.textContent = Lang.t('loginError');
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `<span data-i18n="loginBtn">${Lang.t('loginBtn')}</span>`;
  }
}
</script>

<script src="/assets/i18n.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => Lang.init());</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW:', err));
    });
  }
</script>
</body>
</html>
