<!DOCTYPE html>
<!-- v3.5 - insert address between rows + fix header parsing -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinador — TerriOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
<style>
  .terr-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;}
  .terr-card-map{width:100%;height:180px;object-fit:contain;display:block;background:#f3f4f8;}
  .terr-card-body{padding:1rem 1.2rem;}
  .terr-card-num{font-family:var(--font-head);font-weight:800;font-size:1.4rem;}
  .terr-card-streets{color:var(--muted);font-size:0.82rem;margin-top:0.2rem;}
  .terr-card-footer{padding:0.7rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;flex-wrap:wrap;}
  .detail-map{width:100%;display:block;object-fit:contain;background:#f3f4f8;}
  .detail-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;}
  .detail-header-body{padding:1.2rem;}
  .detail-title{font-family:var(--font-head);font-weight:800;font-size:1.6rem;}
  .detail-streets{color:var(--muted);font-size:0.85rem;margin-top:0.2rem;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin:1rem 0;}
  .info-box{background:var(--surface2);border-radius:8px;padding:0.7rem 0.9rem;}
  .info-box-label{font-family:var(--font-mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
  .info-box-value{font-weight:600;font-size:0.9rem;margin-top:0.2rem;}
  .start-box{background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);border-radius:8px;padding:0.7rem 0.9rem;font-size:0.85rem;margin-bottom:0.8rem;}
  .nav-btn-full{display:block;width:100%;padding:0.85rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font-head);font-weight:700;font-size:1rem;text-align:center;cursor:pointer;text-decoration:none;margin-bottom:0.5rem;}
  .nav-btn-full:hover{background:#3a7de8;color:#fff;text-decoration:none;}
  .addr-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;}
  .addr-section-header{padding:0.9rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .addr-section-title{font-family:var(--font-head);font-weight:700;font-size:0.95rem;}
  .addr-row{display:flex;align-items:center;padding:0.65rem 1rem;border-bottom:1px solid var(--border);gap:0.5rem;flex-wrap:wrap;}
  .addr-row:last-child{border-bottom:none;}
  .addr-row.visited{background:rgba(54,211,153,0.04);}
  .addr-num{font-weight:700;font-size:0.9rem;min-width:70px;}
  .addr-street{color:var(--muted);font-size:0.82rem;min-width:90px;}
  .addr-obs{flex:1;font-size:0.82rem;}
  .obs-tag{display:inline-block;padding:0.15rem 0.6rem;border-radius:4px;font-size:0.72rem;background:rgba(245,197,24,0.12);color:var(--yellow);font-family:var(--font-mono);}
  .addr-date{font-size:0.78rem;color:var(--muted);}
  .edit-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.25rem 0.6rem;font-size:0.75rem;cursor:pointer;color:var(--text);}
  .edit-btn:hover{border-color:var(--accent);color:var(--accent);}
  .phone-row{display:flex;align-items:flex-start;padding:0.65rem 1rem;border-bottom:1px solid var(--border);gap:0.5rem;flex-wrap:wrap;}
  .phone-row:last-child{border-bottom:none;}
  .preset-btn{display:block;width:100%;text-align:left;padding:0.7rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:0.88rem;margin-bottom:0.4rem;transition:all .15s;}
  .preset-btn:hover,.preset-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;}
  .tab-btn{padding:0.7rem 1.2rem;font-family:var(--font-mono);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-pane{display:none;}
  .tab-pane.active{display:block;}
  .page{padding:1rem;max-width:900px;margin:0 auto;}
  .sticky-bar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
</style>
</head>
<body>
<div id="loading-screen" class="loading-screen"><div class="spinner"></div><span>Cargando...</span></div>

<div id="app" style="display:none">

  <div id="view-dashboard">
    <div class="sticky-bar">
      <span style="font-family:var(--font-head);font-weight:800;">Terri<span style="color:var(--accent)">·</span>OS</span>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <span id="dash-user-name" style="font-size:0.82rem;color:var(--muted);"></span>
        <button class="lang-toggle" id="lang-toggle" onclick="Lang.toggle()">EN</button>
        <button class="btn btn-ghost btn-sm" id="btn-logout">Salir</button>
      </div>
    </div>
    <div class="page">
      <div id="dash-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.8rem;margin-bottom:1.5rem;"></div>
      <div id="expired-banner" style="display:none;background:var(--red-light);border:1px solid #fecdca;border-radius:var(--radius);padding:0.8rem 1rem;color:var(--red);font-size:0.85rem;margin-bottom:1rem;">
        ⚠️ Tienes territorios vencidos. Por favor devuélvelos lo antes posible.
      </div>

      <!-- Active Campaign Banner -->
      <div id="campaign-banner" style="display:none;background:var(--accent-light);border:1px solid #c7d7fd;border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
          <div>
            <div style="font-weight:700;color:var(--accent);font-family:var(--font-head);">🏳️ <span id="camp-banner-name"></span></div>
            <div class="text-sm text-muted" id="camp-banner-dates"></div>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-view-campaign">Ver Campaña →</button>
        </div>
        <!-- My progress -->
        <div style="margin-top:0.8rem;">
          <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);margin-bottom:0.3rem;">
            <span id="camp-my-progress">0 / 0 completados</span>
            <span id="camp-my-pct">0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="camp-my-bar" style="width:0%"></div></div>
        </div>
      </div>

      <h3 style="font-family:var(--font-head);margin-bottom:1rem;">Mis Territorios</h3>
      <div id="my-terr-list"></div>
    </div>
  </div>

  <!-- Campaign View -->
  <div id="view-campaign" style="display:none">
    <div class="sticky-bar">
      <button class="btn btn-ghost btn-sm" id="btn-back-campaign">← Regresar</button>
      <span style="font-weight:600;font-family:var(--font-head);color:var(--accent);" id="camp-view-title">Campaña</span>
    </div>
    <div class="page">
      <div id="camp-terr-list"></div>
    </div>
  </div>

  <div id="view-detail" style="display:none">
    <div class="sticky-bar">
      <button class="btn btn-ghost btn-sm" id="btn-back">← Regresar</button>
      <div style="display:flex;gap:0.5rem;">
        <a id="detail-nav-btn" href="#" target="_blank" class="btn btn-secondary btn-sm" style="display:none">🧭 Navegar</a>
        <button class="btn btn-secondary btn-sm" id="btn-share">🔗 Publicadores</button>
      </div>
    </div>
    <div class="page">
      <div class="detail-header">
        <img id="detail-map-img" class="detail-map" style="display:none" alt="Mapa">
        <div class="detail-header-body">
          <div class="detail-title" id="detail-title">—</div>
          <div class="detail-streets" id="detail-streets">—</div>
          <div class="info-grid" id="detail-info"></div>
          <div class="start-box" id="detail-start" style="display:none">
            ⭐ <strong style="color:var(--accent)">Punto de inicio:</strong> <span id="detail-start-text"></span>
          </div>
          <a id="detail-nav-full" href="#" target="_blank" class="nav-btn-full" style="display:none">🧭 Abrir en Google Maps</a>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="door">🚪 Casa en Casa</button>
        <button class="tab-btn" data-tab="phone">📞 Telefónico</button>
      </div>

      <div class="tab-pane active" id="tab-door">
        <div class="addr-section">
          <div class="addr-section-header">
            <span class="addr-section-title">Registro de Casa en Casa</span>
            <span class="text-muted text-sm" id="door-count"></span>
          </div>
          <div id="door-list"></div>
        </div>
      </div>

      <div class="tab-pane" id="tab-phone">
        <div class="addr-section">
          <div class="addr-section-header">
            <span class="addr-section-title">Territorio Telefónico</span>
            <div style="display:flex;gap:0.5rem;align-items:center;">
              <span class="text-muted text-sm" id="phone-count"></span>
              <button class="btn btn-primary btn-sm" id="btn-add-phone">+ Agregar</button>
            </div>
          </div>
          <div id="phone-list"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Edit Address Modal -->
<div class="modal-overlay" id="modal-addr">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="addr-modal-title">Editar Dirección</span>
      <button class="modal-close" id="cls-addr">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="insert-after-idx" value="-1">
      <div style="background:var(--surface2);border-radius:8px;padding:0.6rem 0.9rem;margin-bottom:1rem;">
        <div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);">DIRECCIÓN</div>
        <div id="edit-addr-label" style="font-weight:700;margin-top:0.2rem;"></div>
      </div>
      <!-- Insert new address fields (hidden when editing) -->
      <div id="insert-addr-fields" style="display:none;">
        <div class="form-grid-2" style="margin-bottom:0.5rem;">
          <div class="form-group">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" id="insert-addr" placeholder="Ej: 4700 1/2, 4701 #2">
          </div>
          <div class="form-group">
            <label class="form-label">Calle</label>
            <input type="text" class="form-control" id="insert-street" placeholder="Ej: 58th St">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observación</label>
        <div id="obs-btns"></div>
        <input type="text" class="form-control" id="edit-obs" placeholder="O escribe manualmente..." style="margin-top:0.3rem;">
        <button class="btn btn-ghost btn-sm" id="clear-obs" style="margin-top:0.3rem;">✕ Borrar observación</button>
      </div>
      <div class="form-group">
        <label class="form-label">Comentario</label>
        <textarea class="form-control" id="edit-comment" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de Visita</label>
        <input type="date" class="form-control" id="edit-visit">
        <button class="btn btn-ghost btn-sm" id="clear-visit" style="margin-top:0.3rem;">✕ Borrar fecha</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cls-addr-2">Cancelar</button>
      <button class="btn btn-green" id="save-addr">Guardar</button>
    </div>
  </div>
</div>

<!-- Edit Phone Modal -->
<div class="modal-overlay" id="modal-phone">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="phone-modal-title">Agregar Registro</span>
      <button class="modal-close" id="cls-phone">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Dirección</label>
          <input type="text" class="form-control" id="edit-ph-addr">
        </div>
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" id="edit-ph-name">
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input type="tel" class="form-control" id="edit-ph-num">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-control" id="edit-ph-date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Resultado de Llamada</label>
        <div id="phone-result-btns"></div>
        <input type="text" class="form-control" id="edit-ph-result" placeholder="O escribe manualmente..." style="margin-top:0.3rem;">
        <button class="btn btn-ghost btn-sm" id="clear-ph-result" style="margin-top:0.3rem;">✕ Borrar resultado</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cls-phone-2">Cancelar</button>
      <button class="btn btn-green" id="save-phone">Guardar</button>
    </div>
  </div>
</div>

<script src="/assets/i18n.js"></script>
<script type="module">
import { Auth, DB, Utils } from '/assets/firebase2.js';

let myTerritories = [], addresses = [], phoneRecords = [], settings = {};
let currentTerrId = null, editingAddrId = null, editingPhoneId = null;

document.addEventListener('DOMContentLoaded', () => Lang.init());

Auth.onReady(async (user) => {
  if (!user) { window.location.href = '/index.html'; return; }
  const profile = Auth.currentProfile;
  if (!profile) { window.location.href = '/index.html'; return; }
  document.getElementById('dash-user-name').textContent = profile.name || user.email;
  document.getElementById('btn-logout').addEventListener('click', async (e) => {
    const btn = e.target;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await Auth.logout();
    } catch {
      window.location.href = '/index.html';
    }
  });
  settings = await DB.getSettings();
  await loadMyTerritories(profile.uid);
  await loadActiveCampaign(profile.uid);
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  Lang.apply();
});

async function loadMyTerritories(coordId) {
  const all = await DB.getTerritories();
  const now = Utils.today();
  myTerritories = all.filter(t => t.currentAssign?.coordinatorId === coordId && (t.state === 'Asignado' || t.state === 'Vencido'));
  myTerritories.forEach(t => { if (t.currentAssign?.expiresDate < now) t.state = 'Vencido'; });
  renderDashboard();
}

function renderDashboard() {
  const assigned = myTerritories.filter(t => t.state === 'Asignado').length;
  const expired = myTerritories.filter(t => t.state === 'Vencido').length;
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card stat-blue"><div class="stat-label">Asignados</div><div class="stat-value">${assigned}</div></div>
    <div class="stat-card stat-red"><div class="stat-label">Vencidos</div><div class="stat-value">${expired}</div></div>
    <div class="stat-card stat-muted"><div class="stat-label">Total</div><div class="stat-value">${myTerritories.length}</div></div>`;
  document.getElementById('expired-banner').style.display = expired > 0 ? 'block' : 'none';
  if (!myTerritories.length) {
    document.getElementById('my-terr-list').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No tienes territorios asignados</p></div>`;
    return;
  }
  const html = myTerritories.map(t => {
    const isExp = t.state === 'Vencido';
    const du = Utils.daysUntil(t.currentAssign?.expiresDate);
    return `<div class="terr-card" style="${isExp ? 'border-color:var(--red)' : ''}">
      ${t.mapUrl ? `<img class="terr-card-map" src="${t.mapUrl}" alt="${t.number}">` : ''}
      <div class="terr-card-body">
        <div class="terr-card-num">Territorio ${t.number}</div>
        <div class="terr-card-streets">${t.streets || '—'}</div>
        <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.6rem;">
          <span class="badge ${isExp ? 'badge-red' : 'badge-blue'}">${isExp ? 'Vencido' : 'Asignado'}</span>
          <span class="badge badge-gray">Expira: ${Utils.fmtDate(t.currentAssign?.expiresDate)}</span>
          ${du !== null && du <= 30 && !isExp ? `<span class="badge badge-yellow">${du}d</span>` : ''}
        </div>
      </div>
      <div class="terr-card-footer">
        <button class="btn btn-primary btn-sm open-terr-btn" data-id="${t.id}">📋 Ver Territorio</button>
        ${t.mapLink ? `<a href="${t.mapLink}" target="_blank" class="btn btn-ghost btn-sm">🧭 Navegar</a>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('my-terr-list').innerHTML = html;
  document.querySelectorAll('.open-terr-btn').forEach(btn => {
    btn.addEventListener('click', () => { returnToCampaign = false; openTerritory(btn.dataset.id); });
  });
}

async function openTerritory(terrId) {
  returnToCampaign = returnToCampaign || false;
  currentTerrId = terrId;
  const t = myTerritories.find(x => x.id === terrId);
  if (!t) return;
  document.getElementById('detail-title').textContent = `Territorio ${t.number}`;
  document.getElementById('detail-streets').textContent = t.streets || '—';
  const mapImg = document.getElementById('detail-map-img');
  if (t.mapUrl) { mapImg.src = t.mapUrl; mapImg.style.display = 'block'; }
  else mapImg.style.display = 'none';
  const isExp = t.state === 'Vencido';
  const du = Utils.daysUntil(t.currentAssign?.expiresDate);
  document.getElementById('detail-info').innerHTML = `
    <div class="info-box"><div class="info-box-label">Estado</div><div class="info-box-value"><span class="badge ${isExp ? 'badge-red' : 'badge-blue'}">${isExp ? 'Vencido' : 'Asignado'}</span></div></div>
    <div class="info-box"><div class="info-box-label">Expira</div><div class="info-box-value" style="${isExp ? 'color:var(--red)' : ''}">${Utils.fmtDate(t.currentAssign?.expiresDate)}</div></div>`;
  if (t.startPoint) { document.getElementById('detail-start-text').textContent = t.startPoint; document.getElementById('detail-start').style.display = 'block'; }
  else document.getElementById('detail-start').style.display = 'none';
  if (t.mapLink) {
    document.getElementById('detail-nav-btn').href = t.mapLink; document.getElementById('detail-nav-btn').style.display = 'inline-flex';
    document.getElementById('detail-nav-full').href = t.mapLink; document.getElementById('detail-nav-full').style.display = 'block';
  } else { document.getElementById('detail-nav-btn').style.display = 'none'; document.getElementById('detail-nav-full').style.display = 'none'; }
  [addresses, phoneRecords] = await Promise.all([DB.getAddresses(terrId), DB.getPhoneRecords(terrId)]);
  renderDoorList(); renderPhoneList();
  document.getElementById('view-dashboard').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0, 0);
  activateTab('door');
}

function renderDoorList() {
  document.getElementById('door-count').textContent = `${addresses.length} direcciones`;
  if (!addresses.length) { document.getElementById('door-list').innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:0.85rem;">Sin direcciones</div>`; return; }
  
  let html = '';
  addresses.forEach((a, i) => {
    // Insert button above each row
    html += `<div class="insert-row-btn" data-order="${a.order ?? i}" data-after="${i === 0 ? -1 : (addresses[i-1].order ?? i-1)}" style="height:4px;background:transparent;cursor:pointer;transition:all .15s;position:relative;" title="Insertar dirección aquí">
      <div style="position:absolute;left:50%;transform:translateX(-50%);top:-10px;opacity:0;transition:opacity .15s;background:var(--accent);color:#fff;border-radius:20px;padding:0.15rem 0.6rem;font-size:0.7rem;white-space:nowrap;pointer-events:none;">+ Insertar aquí</div>
    </div>`;
    html += `<div class="addr-row ${a.visitDate ? 'visited' : ''}">
      <div class="addr-num">${a.address}</div>
      <div class="addr-street">${a.street || ''}</div>
      <div class="addr-obs">${a.observation ? `<span class="obs-tag">${a.observation}</span>` : ''}${a.comment ? `<span style="font-size:0.78rem;color:var(--muted);margin-left:0.3rem;">${a.comment}</span>` : ''}</div>
      <div class="addr-date">${a.visitDate ? Utils.fmtDate(a.visitDate) : ''}</div>
      <button class="edit-btn edit-addr-btn" data-id="${a.id}">✏️</button>
    </div>`;
  });
  // Insert button at the end
  html += `<div class="insert-row-btn" data-order="${(addresses[addresses.length-1]?.order ?? addresses.length-1) + 1}" data-after="${addresses.length - 1}" style="height:4px;background:transparent;cursor:pointer;transition:all .15s;position:relative;" title="Insertar al final">
    <div style="position:absolute;left:50%;transform:translateX(-50%);top:-10px;opacity:0;transition:opacity .15s;background:var(--accent);color:#fff;border-radius:20px;padding:0.15rem 0.6rem;font-size:0.7rem;white-space:nowrap;pointer-events:none;">+ Insertar aquí</div>
  </div>`;

  document.getElementById('door-list').innerHTML = html;

  // Edit buttons
  document.querySelectorAll('.edit-addr-btn').forEach(btn => btn.addEventListener('click', () => openEditAddr(btn.dataset.id)));

  // Insert buttons — show label on hover, open modal on click
  document.querySelectorAll('.insert-row-btn').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      btn.style.background = 'var(--accent-light)';
      btn.style.height = '24px';
      btn.querySelector('div').style.opacity = '1';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.background = 'transparent';
      btn.style.height = '4px';
      btn.querySelector('div').style.opacity = '0';
    });
    btn.addEventListener('click', () => {
      const insertAfterIdx = parseInt(btn.dataset.after);
      openInsertAddrModal(insertAfterIdx);
    });
  });
}

function openInsertAddrModal(insertAfterIdx) {
  editingAddrId = null;
  document.getElementById('insert-after-idx').value = insertAfterIdx;
  document.getElementById('edit-addr-label').textContent = insertAfterIdx >= 0 
    ? `Insertar después de: ${addresses[insertAfterIdx]?.address || ''}` 
    : 'Insertar al inicio';
  document.getElementById('edit-obs').value = '';
  document.getElementById('edit-comment').value = '';
  document.getElementById('edit-visit').value = '';
  document.getElementById('addr-modal-title').textContent = '+ Insertar Dirección';
  document.getElementById('insert-addr-fields').style.display = 'block';
  document.getElementById('insert-addr').value = '';
  document.getElementById('insert-street').value = '';
  const ds = (settings.doorStatuses?.length) ? settings.doorStatuses : ['Perro afuera','Duerme de día','Negocio','No tocar','Revisitar','Mudado'];
  document.getElementById('obs-btns').innerHTML = ds.map(s => `<button type="button" class="preset-btn obs-preset-btn" data-val="${s}">${s}</button>`).join('');
  document.querySelectorAll('.obs-preset-btn').forEach(btn => btn.addEventListener('click', () => {
    document.getElementById('edit-obs').value = btn.dataset.val;
    document.querySelectorAll('.obs-preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }));
  document.getElementById('modal-addr').classList.add('open');
}

function openEditAddr(id) {
  editingAddrId = id;
  const a = addresses.find(x => x.id === id);
  if (!a) return;
  document.getElementById('addr-modal-title').textContent = 'Editar Dirección';
  document.getElementById('insert-addr-fields').style.display = 'none';
  document.getElementById('edit-addr-label').textContent = `${a.address} ${a.street || ''}`;
  document.getElementById('edit-obs').value = a.observation || '';
  document.getElementById('edit-comment').value = a.comment || '';
  document.getElementById('edit-visit').value = a.visitDate || '';
  const ds = (settings.doorStatuses?.length) ? settings.doorStatuses : ['Perro afuera','Duerme de día','Negocio','No tocar','Revisitar','Mudado'];
  document.getElementById('obs-btns').innerHTML = ds.map(s => `<button type="button" class="preset-btn obs-preset-btn${s === a.observation ? ' active' : ''}" data-val="${s}">${s}</button>`).join('');
  document.querySelectorAll('.obs-preset-btn').forEach(btn => btn.addEventListener('click', () => {
    document.getElementById('edit-obs').value = btn.dataset.val;
    document.querySelectorAll('.obs-preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }));
  document.getElementById('modal-addr').classList.add('open');
}

document.getElementById('save-addr').addEventListener('click', async () => {
  const isInsert = !editingAddrId;

  if (isInsert) {
    // Insert new address at position
    const insertAfterIdx = parseInt(document.getElementById('insert-after-idx').value);
    const newAddr = document.getElementById('insert-addr').value.trim();
    const newStreet = document.getElementById('insert-street').value.trim();
    if (!newAddr) { Utils.toast('Dirección requerida', 'error'); return; }

    // Calculate new order value between neighbors
    const beforeOrder = insertAfterIdx >= 0 ? (addresses[insertAfterIdx]?.order ?? insertAfterIdx) : -1;
    const afterOrder = insertAfterIdx + 1 < addresses.length ? (addresses[insertAfterIdx + 1]?.order ?? insertAfterIdx + 1) : beforeOrder + 2;
    const newOrder = (beforeOrder + afterOrder) / 2;

    const data = {
      address: newAddr,
      street: newStreet,
      observation: document.getElementById('edit-obs').value.trim(),
      comment: document.getElementById('edit-comment').value.trim(),
      visitDate: document.getElementById('edit-visit').value,
      order: newOrder
    };
    await DB.saveAddress(currentTerrId, data, null);
  } else {
    // Edit existing address
    const a = addresses.find(x => x.id === editingAddrId);
    if (!a) return;
    const data = {
      observation: document.getElementById('edit-obs').value.trim(),
      comment: document.getElementById('edit-comment').value.trim(),
      visitDate: document.getElementById('edit-visit').value
    };
    Object.assign(a, data);
    await DB.saveAddress(currentTerrId, data, editingAddrId);
  }

  addresses = await DB.getAddresses(currentTerrId);
  closeModals();
  renderDoorList();
  Utils.toast('Guardado', 'success');
});

document.getElementById('clear-obs').addEventListener('click', () => {
  document.getElementById('edit-obs').value = '';
  document.querySelectorAll('.obs-preset-btn').forEach(b => b.classList.remove('active'));
});
document.getElementById('clear-visit').addEventListener('click', () => { document.getElementById('edit-visit').value = ''; });

function renderPhoneList() {
  document.getElementById('phone-count').textContent = `${phoneRecords.length} registros`;
  if (!phoneRecords.length) { document.getElementById('phone-list').innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:0.85rem;">Sin registros — usa el botón + Agregar</div>`; return; }
  document.getElementById('phone-list').innerHTML = phoneRecords.map(r => `
    <div class="phone-row">
      <div style="font-weight:700;font-size:0.85rem;min-width:60px;">${r.address}</div>
      <div style="font-size:0.82rem;color:var(--muted);min-width:100px;">${r.name || '—'}</div>
      <div style="font-family:var(--font-mono);font-size:0.82rem;min-width:110px;">${r.phone || '—'}</div>
      <div style="flex:1;">${r.callResult ? `<span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;background:var(--accent-light);color:var(--accent);font-weight:600;">${r.callResult}</span>` : ''}${r.date ? `<span style="font-size:0.75rem;color:var(--muted);margin-left:0.3rem;">${Utils.fmtDate(r.date)}</span>` : ''}</div>
      <div style="display:flex;gap:0.3rem;">
        <button class="edit-btn edit-phone-btn" data-id="${r.id}" title="Editar">✏️</button>
        <button class="edit-btn del-phone-btn" data-id="${r.id}" title="Eliminar" style="color:var(--red);border-color:#fecdca;">🗑</button>
      </div>
    </div>`).join('');
  document.querySelectorAll('.edit-phone-btn').forEach(btn => btn.addEventListener('click', () => openEditPhone(btn.dataset.id)));
  document.querySelectorAll('.del-phone-btn').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('¿Eliminar este registro telefónico?')) return;
    await DB.deletePhoneRecord(currentTerrId, btn.dataset.id);
    phoneRecords = await DB.getPhoneRecords(currentTerrId);
    renderPhoneList();
    Utils.toast('Registro eliminado', 'success');
  }));
}

function openEditPhone(id) {
  editingPhoneId = id || null;
  const r = id ? phoneRecords.find(x => x.id === id) : null;
  document.getElementById('phone-modal-title').textContent = id ? 'Editar Registro' : 'Agregar Registro';
  document.getElementById('edit-ph-addr').value = r?.address || '';
  document.getElementById('edit-ph-name').value = r?.name || '';
  document.getElementById('edit-ph-num').value = r?.phone || '';
  document.getElementById('edit-ph-date').value = r?.date || Utils.today();
  document.getElementById('edit-ph-result').value = r?.callResult || '';
  const ps = (settings.phoneStatuses?.length) ? settings.phoneStatuses : ['No en casa','Línea desconectada','Persona ocupada','Plática','No interesado','Volvió a llamar','Número equivocado'];
  document.getElementById('phone-result-btns').innerHTML = ps.map(s => `<button type="button" class="preset-btn ph-preset-btn${s === r?.callResult ? ' active' : ''}" data-val="${s}">${s}</button>`).join('');
  document.querySelectorAll('.ph-preset-btn').forEach(btn => btn.addEventListener('click', () => {
    document.getElementById('edit-ph-result').value = btn.dataset.val;
    document.querySelectorAll('.ph-preset-btn').forEach(b => b.classList.remove('active'));

}

document.getElementById('save-phone').addEventListener('click', async () => {
  const data = { address: document.getElementById('edit-ph-addr').value.trim(), name: document.getElementById('edit-ph-name').value.trim(), phone: document.getElementById('edit-ph-num').value.trim(), date: document.getElementById('edit-ph-date').value, callResult: document.getElementById('edit-ph-result').value.trim(), order: editingPhoneId ? phoneRecords.find(r => r.id === editingPhoneId)?.order ?? phoneRecords.length : phoneRecords.length };
  if (!data.address) { Utils.toast('Dirección requerida', 'error'); return; }
  await DB.savePhoneRecord(currentTerrId, data, editingPhoneId);
  phoneRecords = await DB.getPhoneRecords(currentTerrId);
  closeModals(); renderPhoneList(); Utils.toast('Guardado', 'success');
});

document.getElementById('clear-ph-result').addEventListener('click', () => { document.getElementById('edit-ph-result').value = ''; document.querySelectorAll('.ph-preset-btn').forEach(b => b.classList.remove('active')); });

function activateTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
}
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => activateTab(btn.dataset.tab)));

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }
['cls-addr','cls-addr-2','cls-phone','cls-phone-2'].forEach(id => document.getElementById(id).addEventListener('click', closeModals));
document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) closeModals(); }));

document.getElementById('btn-add-phone').addEventListener('click', () => openEditPhone(null));
document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('view-detail').style.display = 'none';
  if (returnToCampaign) {
    returnToCampaign = false;
    document.getElementById('view-campaign').style.display = 'block';
  } else {
    document.getElementById('view-dashboard').style.display = 'block';
  }
  window.scrollTo(0, 0);
});
document.getElementById('btn-share').addEventListener('click', () => { if (!currentTerrId) return; const url = `${window.location.origin}/view/?t=${currentTerrId}`; if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => Utils.toast('Enlace copiado', 'success')); else prompt('Enlace:', url); });
document.getElementById('btn-back-campaign').addEventListener('click', () => { document.getElementById('view-campaign').style.display = 'none'; document.getElementById('view-dashboard').style.display = 'block'; window.scrollTo(0, 0); });
document.getElementById('btn-view-campaign').addEventListener('click', () => openCampaignView());

// ── Campaign Functions ────────────────────────────────────────────────────────
let activeCampaign = null, myCampaignAssignments = [], coordProfileId = null;

async function loadActiveCampaign(coordId) {
  coordProfileId = coordId;
  activeCampaign = await DB.getActiveCampaign();
  if (!activeCampaign) {
    document.getElementById('campaign-banner').style.display = 'none';
    return;
  }
  myCampaignAssignments = await DB.getCampaignAssignmentsForCoordinator(activeCampaign.id, coordId);
  if (!myCampaignAssignments.length) {
    document.getElementById('campaign-banner').style.display = 'none';
    return;
  }

  // Show banner
  document.getElementById('campaign-banner').style.display = 'block';
  document.getElementById('camp-banner-name').textContent = activeCampaign.name;
  document.getElementById('camp-banner-dates').textContent = `${Utils.fmtDate(activeCampaign.startDate)} — ${Utils.fmtDate(activeCampaign.endDate)}`;

  const completed = myCampaignAssignments.filter(a => a.status === 'completado').length;
  const total = myCampaignAssignments.length;
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
  document.getElementById('camp-my-progress').textContent = `${completed} / ${total} completados`;
  document.getElementById('camp-my-pct').textContent = `${pct}%`;
  document.getElementById('camp-my-bar').style.width = `${pct}%`;
}

function openCampaignView() {
  if (!activeCampaign) return;
  document.getElementById('camp-view-title').textContent = `🏳️ ${activeCampaign.name}`;
  renderCampaignTerritories();
  document.getElementById('view-dashboard').style.display = 'none';
  document.getElementById('view-campaign').style.display = 'block';
  window.scrollTo(0, 0);
}

function renderCampaignTerritories() {
  const completed = myCampaignAssignments.filter(a => a.status === 'completado').length;
  const total = myCampaignAssignments.length;

  let html = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:1rem;box-shadow:var(--shadow-sm);">
    <div style="font-family:var(--font-head);font-weight:700;font-size:1rem;margin-bottom:0.3rem;">${activeCampaign.name}</div>
    ${activeCampaign.description ? `<div class="text-sm text-muted" style="margin-bottom:0.8rem;">${activeCampaign.description}</div>` : ''}
    <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);margin-bottom:0.3rem;">
      <span>${completed} / ${total} territorios completados</span>
      <span>${total > 0 ? Math.round((completed/total)*100) : 0}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${total > 0 ? Math.round((completed/total)*100) : 0}%;background:${completed===total?'var(--green)':'var(--accent)'}"></div></div>
  </div>`;

  html += myCampaignAssignments.map(a => {
    const isComplete = a.status === 'completado';
    const terr = myTerritories.find(t => t.id === a.territoryId) || { id: a.territoryId, number: a.territoryNumber, streets: '' };
    return `<div style="background:${isComplete ? 'var(--green-light)' : 'var(--surface)'};border:1px solid ${isComplete ? '#a9efd1' : 'var(--border)'};border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:0.7rem;box-shadow:var(--shadow-sm);">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
        <div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:1rem;">Territorio ${a.territoryNumber}</div>
          ${terr.streets ? `<div class="text-sm text-muted">${terr.streets}</div>` : ''}
          ${isComplete ? `<div class="text-sm" style="color:var(--green);margin-top:0.2rem;">✅ Completado ${a.completedDate ? Utils.fmtDate(a.completedDate) : ''}</div>` : ''}
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-secondary btn-sm camp-view-terr-btn" data-terrid="${a.territoryId}" data-terrnum="${a.territoryNumber}">📋 Ver Territorio</button>
          ${terr.mapLink ? `<a href="${terr.mapLink}" target="_blank" class="btn btn-ghost btn-sm">🧭 Navegar</a>` : ''}
          <button class="btn ${isComplete ? 'btn-secondary' : 'btn-green'} btn-sm camp-complete-btn" data-id="${a.id}" data-complete="${isComplete}">
            ${isComplete ? '↩ Desmarcar' : '✅ Marcar Completado'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('camp-terr-list').innerHTML = html;

  // Ver Territorio from campaign
  document.querySelectorAll('.camp-view-terr-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await openTerritoryFromCampaign(btn.dataset.terrid, btn.dataset.terrnum);
    });
  });

  document.querySelectorAll('.camp-complete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const isComplete = btn.dataset.complete === 'true';
      btn.disabled = true;
      btn.textContent = '...';
      await DB.markCampaignTerritoryComplete(id, !isComplete);
      // Update local state
      const a = myCampaignAssignments.find(x => x.id === id);
      if (a) {
        a.status = !isComplete ? 'completado' : 'pendiente';
        a.completedDate = !isComplete ? Utils.today() : null;
      }
      // Refresh banner counts
      await loadActiveCampaign(coordProfileId);
      renderCampaignTerritories();
      Utils.toast(!isComplete ? '✅ Territorio completado' : 'Desmarcado', 'success');
    });
  });
}

// Opens a territory from the campaign view — fetches full territory data
let returnToCampaign = false;

async function openTerritoryFromCampaign(terrId, terrNumber) {
  returnToCampaign = true;
  // Fetch full territory data since it may not be in myTerritories
  let t = myTerritories.find(x => x.id === terrId);
  if (!t) {
    t = await DB.getTerritory(terrId);
  }
  if (!t) {
    Utils.toast('Territorio no encontrado', 'error');
    return;
  }
  // Temporarily add to myTerritories if not there so openTerritory works
  if (!myTerritories.find(x => x.id === terrId)) {
    myTerritories.push(t);
  }
  // Hide campaign view before opening territory
  document.getElementById('view-campaign').style.display = 'none';
  await openTerritory(terrId);
}
