[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/coordinator"
  to = "/coordinator/index.html"
  status = 200

[[redirects]]
  from = "/view"
  to = "/view/index.html"
  status = 200

[[redirects]]
  from = "/view/"
  to = "/view/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/coordinator/"
  to = "/coordinator/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
