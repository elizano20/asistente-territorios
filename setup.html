<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup — Asistente de Territorios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Terri<span>·</span>OS <span style="font-size:0.9rem;color:var(--yellow)">Setup</span></div>
    <p class="login-subtitle">Crear cuenta de administrador</p>
    <p style="background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:8px;padding:0.7rem 1rem;color:var(--yellow);font-size:0.78rem;margin-bottom:1.5rem;">
      ⚠️ Esta página es solo para configuración inicial. Elimínala o protégela después de crear tu cuenta admin.
    </p>

    <div id="setup-error" class="login-error"></div>
    <div id="setup-success" style="display:none;background:rgba(54,211,153,0.1);border:1px solid rgba(54,211,153,0.3);border-radius:8px;padding:0.7rem 1rem;color:var(--green);font-size:0.82rem;margin-bottom:1rem;"></div>

    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="form-control" id="setup-name" placeholder="Apellido, Nombre">
    </div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="setup-email" placeholder="admin@congregacion.org">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña (mínimo 6 caracteres)</label>
      <input type="password" class="form-control" id="setup-password">
    </div>
    <div class="form-group">
      <label class="form-label">Código de verificación</label>
      <input type="text" class="form-control" id="setup-code" placeholder="TERRIOSADMIN2024">
      <span class="form-hint">Código requerido para crear admin: TERRIOSADMIN2024</span>
    </div>
    <button class="btn btn-primary btn-lg w-full" onclick="createAdmin()" style="margin-top:0.5rem">Crear Administrador</button>
  </div>
</div>

<script type="module">
import { auth, db } from '/assets/firebase.js';
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const SETUP_CODE = 'TERRIOSADMIN2024';

window.createAdmin = async function() {
  const name = document.getElementById('setup-name').value.trim();
  const email = document.getElementById('setup-email').value.trim();
  const password = document.getElementById('setup-password').value;
  const code = document.getElementById('setup-code').value.trim();
  const errEl = document.getElementById('setup-error');
  const sucEl = document.getElementById('setup-success');

  errEl.classList.remove('show');
  errEl.style.display = 'none';

  if (!name || !email || !password) { errEl.textContent = 'Todos los campos son requeridos.'; errEl.style.display = 'block'; return; }
  if (code !== SETUP_CODE) { errEl.textContent = 'Código de verificación incorrecto.'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; errEl.style.display = 'block'; return; }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      name, email, role: 'admin', active: true, createdAt: serverTimestamp()
    });

    // Create default settings
    await setDoc(doc(db, 'settings', 'global'), {
      maxTerr: 8, maxDays: 120, consecutive: true,
      doorStatuses: ['Perro afuera', 'Duerme de día', 'Negocio', 'No tocar', 'Revisitar', 'Mudado'],
      phoneStatuses: ['No en casa', 'Línea desconectada', 'Persona ocupada', 'Plática', 'No interesado', 'Volvió a llamar', 'Número equivocado']
    });

    sucEl.innerHTML = `✅ Administrador creado exitosamente.<br><strong>${name}</strong> (${email})<br><br><a href="/admin/" style="color:var(--green)">→ Ir al panel de administrador</a>`;
    sucEl.style.display = 'block';
  } catch (err) {
    errEl.textContent = 'Error: ' + err.message;
    errEl.style.display = 'block';
  }
};
</script>
</body>
</html>
